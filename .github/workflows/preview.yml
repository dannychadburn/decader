name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Preview
        uses: rossjirtle/pr-preview-action@v1
        with:
          source-dir: . # Deploy the root of your repo
          preview-branch: gh-pages # Where the previews are stored
          umbrella-dir: previews # Previews will live at /previews/pr-X/
          action: ${{ github.event.action }}
          pr-number: ${{ github.event.number }}
