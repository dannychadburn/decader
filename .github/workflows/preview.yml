name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Preview
        uses: afc163/gh-pages-pr-preview@v1
        with:
          # This action handles the "umbrella" and PR numbering automatically
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          action: ${{ github.event.action }}
          # Path to your files (the root of your repo)
          path: .
